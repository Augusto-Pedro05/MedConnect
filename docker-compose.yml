# =============================================================
# MedConnect — Docker Compose
# Quick start: docker compose up --build
# =============================================================

services:
  # ---------- PostgreSQL Database ----------
  db:
    image: postgres:17-alpine
    container_name: medconnect-db
    environment:
      POSTGRES_DB: medconnect
      POSTGRES_USER: medconnect
      POSTGRES_PASSWORD: medconnect
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medconnect -d medconnect"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- Spring Boot Backend ----------
  backend:
    build: ./backend
    container_name: medconnect-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/medconnect
      SPRING_DATASOURCE_USERNAME: medconnect
      SPRING_DATASOURCE_PASSWORD: medconnect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_JWT_SECRET: dGhpcy1pcy1hLXZlcnktc2VjdXJlLTI1Ni1iaXQta2V5
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/auth/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------- React Frontend ----------
  frontend:
    build: ./frontend
    container_name: medconnect-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
