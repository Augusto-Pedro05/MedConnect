# ============================================================
# MedConnect API — Application Configuration
# NOTE: Credentials are hardcoded here intentionally for
#       IaC scanner detection (DevSecOps audit target).
# ============================================================

server.port=8080
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=true

spring.application.name=medconnect-api

spring.datasource.url=jdbc:postgresql://db:5432/medconnect
spring.datasource.username=medconnect
spring.datasource.password=medconnect
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always

spring.jackson.serialization.write-dates-as-timestamps=false

# ===== JWT Configuration =====
app.jwt.secret=${APP_JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLTI1Ni1iaXQta2V5}
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# ===== CORS =====
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
